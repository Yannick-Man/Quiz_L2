    let activeQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;
	let isExamenMode = false; // <-- Ajoutez cette ligne

    // Fonction utilitaire pour mélanger un tableau (Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz(choice) {
        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("quiz-screen").style.display = "block";
		
		isExamenMode = (choice === 5); // <-- Ajoutez cette ligne
        
        if (choice === 1) {
            activeQuestions = allQuestions.slice(0, 22);
            document.getElementById("quiz-title").innerText = "Mode : Technique (1-22)";
        } 
        else if (choice === 2) {
            activeQuestions = allQuestions.slice(22, 55);
            document.getElementById("quiz-title").innerText = "Mode : Technique (23-55)";
        } 
        else if (choice === 3) {
            activeQuestions = allQuestions.slice(55, 77);
            document.getElementById("quiz-title").innerText = "Mode : Sécurité (1-22)";
        } 
        else if (choice === 4) {
            activeQuestions = allQuestions.slice(77, 108);
            document.getElementById("quiz-title").innerText = "Mode : Sécurité (23-53)";
        } 
        else if (choice === 5) {
            // EXAMEN : 25 techniques au hasard + 25 sécurités au hasard
            let techPool = shuffle([...allQuestions.slice(0, 55)]).slice(0, 25);
            let safetyPool = shuffle([...allQuestions.slice(55, 108)]).slice(0, 25);
            activeQuestions = techPool.concat(safetyPool);
            document.getElementById("quiz-title").innerText = "📝 MODE EXAMEN (Aléatoire)";
        }

        currentQuestionIndex = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
    hasAnswered = false;
    const q = activeQuestions[currentQuestionIndex];
    document.getElementById("question-text").innerText = q.q;
    const optionsContainer = document.getElementById("options-container");
    optionsContainer.innerHTML = "";

    // 1. On prépare l'indice
    document.getElementById("hint-section").style.display = "none";
    document.getElementById("hint-section").innerText = "💡 Indice : " + q.hint;

    // 2. GESTION DU MODE EXAMEN (C'est ici qu'on décide d'afficher ou non le bouton)
    if (isExamenMode) {
        document.getElementById("hint-btn").style.display = "none"; 
    } else {
        document.getElementById("hint-btn").style.display = "block";
    }

    // 3. On gère les boutons de navigation
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("skip-btn").style.display = "block";

    // 4. Barre de progression
    const progressPercentage = (currentQuestionIndex / activeQuestions.length) * 100;
    document.getElementById("progress-bar").style.width = progressPercentage + "%";
    document.getElementById("progress-text").innerText = `Question ${currentQuestionIndex + 1} / ${activeQuestions.length}`;

    // 5. Affichage des options
    q.options.forEach((optText, index) => {
        const optDiv = document.createElement("div");
        optDiv.className = "option";
        optDiv.innerText = optText;
        optDiv.onclick = () => checkAnswer(index, optDiv);
        optionsContainer.appendChild(optDiv);
    });
}

    function checkAnswer(selectedIndex, optionElement) {
        if (hasAnswered) return;
        hasAnswered = true;
        
        const q = activeQuestions[currentQuestionIndex];
        const allOptions = document.querySelectorAll(".option");
        allOptions.forEach(opt => opt.classList.add("disabled"));

        if (selectedIndex === q.correct) {
            optionElement.classList.add("correct");
            score++;
        } else {
            optionElement.classList.add("wrong");
            allOptions[q.correct].classList.add("correct");
        }
        
        document.getElementById("next-btn").style.display = "block";
        document.getElementById("skip-btn").style.display = "none";
    }

    function toggleHint() {
        document.getElementById("hint-section").style.display = "block";
        document.getElementById("hint-btn").style.display = "none";
    }

    function nextQuestion(isSkipped) {
        if (isSkipped) {
            // Si on saute, on ne marque pas de point mais on avance
        }
        
        currentQuestionIndex++;
        if (currentQuestionIndex < activeQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        const scorePercentage = (score / activeQuestions.length) * 100;
        document.getElementById("final-score").innerText = `${score} / ${activeQuestions.length} (${scorePercentage.toFixed(0)}%)`;
        
        if (scorePercentage >= 90) {
            document.getElementById("result-message").innerHTML = "<span style='color:green'>Bravo ! Vous avez réussi le test (90% min requis).</span>";
        } else {
            document.getElementById("result-message").innerHTML = "<span style='color:red'>Insuffisant. Vous devez obtenir au moins 90% pour la certification Tripoli.</span>";
        }
    }
	
	function returnToMenu() {
    if (confirm("Voulez-vous vraiment quitter le quiz et revenir au menu ?")) {
        location.reload();
    }
}
